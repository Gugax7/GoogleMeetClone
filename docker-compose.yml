version: '3.8'

services:
  frontend:
    build: ./frontend
    ports: 
      - "3001:5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:4000"
    volumes:
      - ./backend:/server
      - /server/node_modules